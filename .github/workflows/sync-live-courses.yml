name: Sync live courses from Harvard API

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily (3am ET / before Harvard business day)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync
        env:
          HARVARD_API_KEY: ${{ secrets.HARVARD_API_KEY }}
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
        run: python scripts/sync_live_courses.py
